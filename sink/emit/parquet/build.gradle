description = 'Parquet renderer: descriptor-driven columnar files from protobuf messages, no generated classes and no native Hadoop'

dependencies {
    api project(':protomolt-emit')
    api libs.protobuf.java
    implementation libs.protobuf.java.util
    // Masking-on-export reads the sensitivity field option through SensitivityMasker.
    implementation project(':protomolt-protobuf-metadata')

    implementation libs.parquet.hadoop
    implementation 'org.xerial.snappy:snappy-java:1.1.10.7'
    // Hadoop appears in parquet-hadoop method signatures only; nothing on the write
    // path loads a Hadoop class at run time (HadoopFreeParquetTest proves it), so the
    // API jar is compile-time only and consumers get zero Hadoop jars.
    compileOnly libs.hadoop.client.api
    testCompileOnly libs.hadoop.client.api

    testImplementation project(':protomolt-proto-sources')
    // The example Group reader used to verify round-trips materializes a Hadoop
    // Configuration; the writer under test never does.
    testRuntimeOnly 'org.apache.hadoop:hadoop-client-runtime:3.4.1'
}
