description = 'Kafka Connect sink and source: topics drive gRPC services and gRPC streams feed topics, descriptor-native with no generated stubs'

dependencies {
    api project(':protomolt-grpc-invoke')

    // The Connect worker provides the framework at runtime; plugins must not bundle it.
    compileOnly libs.kafka.connect.api

    implementation project(':protomolt-kafka-wire')
    implementation project(':protomolt-json')
    implementation project(':protomolt-mapper-cel')
    implementation project(':protomolt-protobuf-validation')
    implementation project(':protomolt-protobuf-metadata')
    implementation libs.protobuf.java.util

    runtimeOnly libs.grpc.netty.shaded

    testImplementation libs.kafka.connect.api
    testImplementation project(':protomolt-proto-sources')
    testImplementation libs.grpc.inprocess
    testImplementation libs.grpc.protobuf
    testImplementation libs.grpc.stub
}

// One plugin.path directory: the connector jar plus its runtime dependencies
// (the Connect framework itself is compileOnly and stays out).
tasks.register('connectPluginZip', Zip) {
    description = 'Packages the Kafka Connect plugin as a plugin.path-ready zip'
    group = 'distribution'
    archiveBaseName = 'protomolt-connect-plugin'
    from tasks.named('jar')
    from configurations.runtimeClasspath
    into 'protomolt-connect'
}
