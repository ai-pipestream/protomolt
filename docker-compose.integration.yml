# Local registries for integration tests (non-default ports to avoid clashes).
#   docker compose -f docker-compose.integration.yml up -d
# Apicurio native API:      http://localhost:18780
# Apicurio ccompat API:     http://localhost:18780/apis/ccompat/v7
# Confluent Schema Registry: http://localhost:18781
# Iceberg REST catalog:      http://localhost:18181
# Iceberg REST catalog (S3):  http://localhost:18182  (warehouse on RustFS)
# Gravitino Iceberg REST:    http://localhost:19002/iceberg
# RustFS (S3 API):           http://localhost:19000
services:
  apicurio:
    image: apicurio/apicurio-registry:3.0.13
    ports:
      - "18780:8080"
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  # Redpanda stands in for Kafka as the Schema Registry's backing store: it is
  # Kafka-API compatible, starts in seconds, and needs no ZooKeeper/KRaft tuning,
  # which keeps this stack practical in CI.
  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.11
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://kafka:29092,external://localhost:19092
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 5s
      timeout: 5s
      retries: 30

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.1
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "18781:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Live search engines for the index-module integration suites: the generated
  # schemas/mappings are applied to real engines and queried back.
  solr:
    image: solr:9
    ports:
      - "18983:8983"
    command: ["solr-precreate", "protomolt"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8983/solr/admin/info/system || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Iceberg REST catalog for the lake-module integration suite. The warehouse is
  # a host tmp directory mounted at the SAME absolute path inside the container,
  # so the catalog (in the container) and the test JVM (on the host) both resolve
  # file:// data locations without an object store in the loop.
  iceberg-rest:
    image: apache/iceberg-rest-fixture:1.10.1
    ports:
      - "18181:8181"
    environment:
      CATALOG_WAREHOUSE: file:///tmp/protomolt-iceberg-warehouse
    volumes:
      - /tmp/protomolt-iceberg-warehouse:/tmp/protomolt-iceberg-warehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Apache Gravitino's Iceberg REST catalog service: the same lake lane pointed at a real
  # metadata lake instead of the reference fixture. The catalog backend defaults to memory,
  # which keeps the fixture stateless. Note the endpoint lives under /iceberg, not the root.
  #
  # The entrypoint drops one jar before starting, and the suite does not run without it.
  # Gravitino 1.3.0 launches with a literal `libs/*` on the classpath, and the JVM expands
  # that glob in an order it explicitly leaves unspecified: in practice, the order the
  # filesystem lists the directory in. Two jars in libs/ carry an unrelocated
  # com/fasterxml/jackson/core/util/BufferRecycler: jackson-core 2.21.3, and the aliyun
  # bundle, which shades jackson-core 2.15.2 without relocating it. When the bundle wins the
  # glob, jackson-databind 2.21.3 calls BufferRecycler.releaseToPool, which 2.15.2 does not
  # have, and every createNamespace dies inside the event listener with a NoSuchMethodError.
  # Which jar wins is a property of the host: jackson-core wins on a dev box and the bundle
  # wins on a GitHub runner, so this failed only in CI. Removing the bundle leaves exactly
  # one copy of the class, so the order stops deciding anything. This lane is file:// only,
  # so the Aliyun OSS bundle is dead weight regardless.
  gravitino-iceberg-rest:
    image: apache/gravitino-iceberg-rest:1.3.0
    entrypoint:
      - /bin/bash
      - -c
      - >-
        rm -f /opt/gravitino-iceberg-rest-server/libs/gravitino-iceberg-aliyun-bundle-*.jar &&
        exec /opt/gravitino-iceberg-rest-server/bin/start-iceberg-rest-server.sh
    ports:
      - "19002:9001"
    environment:
      # Its own warehouse tree: sharing one with the reference catalog means two services
      # (each its own container user) creating entries under the same root, which is a
      # portability trap the two suites do not need to take.
      GRAVITINO_ICEBERG_REST_WAREHOUSE: file:///tmp/protomolt-gravitino-warehouse
      # A test fixture does not need the 1 GB default heap; the CI stack is already crowded.
      GRAVITINO_MEM: "-Xms256m -Xmx512m -XX:MaxMetaspaceSize=256m"
    volumes:
      - /tmp/protomolt-gravitino-warehouse:/tmp/protomolt-gravitino-warehouse
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9001/iceberg/v1/config || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40

  # RustFS: a fast, Apache-2.0, S3-compatible object store (a MinIO replacement) that
  # backs the S3FileIO escape-hatch suite. Single ephemeral volume - CI data is thrown
  # away on teardown. Pinned to a concrete tag: RustFS is pre-1.0, moving fast.
  rustfs:
    image: rustfs/rustfs:1.0.0-beta.9
    ports:
      - "19000:9000"
    environment:
      RUSTFS_ACCESS_KEY: protomolt
      RUSTFS_SECRET_KEY: protomoltsecret
      RUSTFS_VOLUMES: /data/rustfs0
      RUSTFS_ADDRESS: 0.0.0.0:9000
      RUSTFS_CONSOLE_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40

  # A second Iceberg REST catalog whose warehouse lives on RustFS through S3FileIO, for
  # the protomolt-iceberg-s3 suite. Unlike the file:// catalog above, nothing is shared on
  # disk: the catalog (container, reaches rustfs:9000) and the test JVM (host, reaches
  # localhost:19000) both resolve the same s3:// keys, each through its own endpoint.
  iceberg-rest-s3:
    image: apache/iceberg-rest-fixture:1.10.1
    depends_on:
      rustfs:
        condition: service_healthy
    ports:
      - "18182:8181"
    environment:
      CATALOG_WAREHOUSE: s3://protomolt-lake/warehouse
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://rustfs:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: protomolt
      AWS_SECRET_ACCESS_KEY: protomoltsecret
      AWS_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8181/v1/config || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30

  opensearch:
    image: opensearchproject/opensearch:2.19.1
    ports:
      - "19200:9200"
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
