description = 'OpenSearch document mapper plugin (ServiceLoader) and a thin HTTP sink'

dependencies {
    api project(':protomolt-index-spi')
    api project(':protomolt-mapper-core')

    // OpenSearchSink builds request bodies and parses bulk responses with Jackson.
    implementation libs.jackson.databind

    // RerankedSemanticSearch orchestrates the two SPIs; consumers choose the providers.
    implementation project(':protomolt-embeddings')
    implementation project(':protomolt-rerank')

    testImplementation libs.opensearch.testcontainers
    testImplementation libs.testcontainers.junit.jupiter
    testImplementation project(':protomolt-protobuf-metadata')
    // The live TEI lane exercises the orchestration against the real providers.
    testImplementation project(':protomolt-embeddings-tei')
    testImplementation project(':protomolt-rerank-tei')
    // Compile-only need: javac resolves the Tei providers' (String) constructors against
    // their (ManagedChannel) overloads; gRPC itself rides along at runtime from the TEI modules.
    testImplementation libs.grpc.api
}

// The TEI lane self-provisions three heavyweight containers (OpenSearch plus two TEI CPU model
// servers), so it runs as its own lane on the Forgejo workflow rather than in the default
// test task, which GitHub CI runs.
tasks.named('test') {
    useJUnitPlatform {
        excludeTags 'tei'
    }
}

tasks.register('teiIntegrationTest', Test) {
    group = 'verification'
    description = 'Runs the self-provisioned TEI rerank lane excluded from the default test task'
    testClassesDirs = sourceSets.test.output.classesDirs
    classpath = sourceSets.test.runtimeClasspath
    useJUnitPlatform {
        includeTags 'tei'
    }
}
