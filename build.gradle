plugins {
    alias(libs.plugins.axion.release)
    alias(libs.plugins.nmcp.aggregation)
}

scmVersion {
    tag {
        prefix = 'v'
    }
    checks {
        uncommittedChanges = false
        aheadOfRemote = false
        snapshotDependencies = false
    }
}

allprojects {
    group = 'ai.pipestream'
    version = findProperty('publishVersion') ?: rootProject.scmVersion.version
}

// The nmcp aggregation resolves its nmcp-tasks runtime from the root project.
repositories {
    mavenCentral()
}

// Maven Central Portal upload (org-wide credentials; releases are triggered by
// the release-and-publish workflow). Aggregates every subproject's publications
// into one portal deployment.
nmcpAggregation {
    centralPortal {
        username = providers.environmentVariable('MAVEN_CENTRAL_USERNAME')
        password = providers.environmentVariable('MAVEN_CENTRAL_PASSWORD')
        publishingType = 'AUTOMATIC'
    }
    publishAllProjectsProbablyBreakingProjectIsolation()
}

tasks.register('bufLint', Exec) {
    group = 'verification'
    description = 'Run buf lint (STANDARD) on Pipestream protobuf standards'
    workingDir = rootDir
    commandLine 'buf', 'lint'
    inputs.files(fileTree(rootDir) {
        include 'buf.yaml'
        include '**/src/main/proto/**/*.proto'
        include '**/src/test/proto/**/*.proto'
        exclude '**/build/**'
    })
}

tasks.register('check') {
    group = 'verification'
    dependsOn('bufLint')
}

// Central Portal validates license, developers, and scm on every pom.
ext.commonPomMetadata = { pom ->
    pom.url = 'https://github.com/ai-pipestream/protomolt'
    pom.licenses {
        license {
            name = 'Apache License, Version 2.0'
            url = 'https://www.apache.org/licenses/LICENSE-2.0'
        }
    }
    pom.developers {
        developer {
            id = 'krickert'
            email = 'krickert@pipestream.ai'
        }
    }
    pom.scm {
        connection = 'scm:git:https://github.com/ai-pipestream/protomolt.git'
        developerConnection = 'scm:git:ssh://git@github.com/ai-pipestream/protomolt.git'
        url = 'https://github.com/ai-pipestream/protomolt'
    }
}

subprojects {
    repositories {
        mavenCentral()
    }

    if (project.name == 'bom') {
        apply plugin: 'java-platform'
        apply plugin: 'version-catalog'
    } else {
        apply plugin: 'java-library'

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(25)
            }
        }

        // Library baseline is JDK 21: compile against the 21 API and emit 21 bytecode,
        // while the toolchain above lets contributors build and test on newer JDKs.
        tasks.withType(JavaCompile).configureEach {
            options.release = 21
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
            maxParallelForks = Math.max(1, Runtime.runtime.availableProcessors().intdiv(2))
        }

        // -PtestJdk=21 runs every test JVM on that Java version, proving the declared
        // runtime baseline actually works - compiling with --release 21 alone does not.
        if (findProperty('testJdk')) {
            tasks.withType(Test).configureEach {
                javaLauncher = javaToolchains.launcherFor {
                    languageVersion = JavaLanguageVersion.of(
                            Integer.parseInt(findProperty('testJdk').toString()))
                }
            }
        }

        // Generated protobuf sources have no javadoc tags; keep doclint useful but quiet.
        tasks.withType(Javadoc).configureEach {
            options.addStringOption('Xdoclint:all,-missing', '-quiet')
        }

        if (project.name != 'samples') {
            dependencies {
                testImplementation platform(libs.junit.bom)
                testImplementation libs.junit.jupiter
                testImplementation libs.assertj.core
                testRuntimeOnly libs.junit.platform.launcher
            }
        }
    }

    if (!['samples', 'system-tests'].contains(project.name)) {
        apply plugin: 'maven-publish'
        apply plugin: 'signing'

        if (project.name != 'bom') {
            java {
                withSourcesJar()
                withJavadocJar()
            }
        }

        publishing {
            publications {
                create('maven', MavenPublication) {
                    if (project.name == 'bom') {
                        from components.javaPlatform
                        artifactId = 'protomolt-bom'
                    } else {
                        from components.java
                    }
                    pom {
                        name = project.name == 'bom'
                            ? 'ProtoMolt BOM'
                            : project.name
                        // Lazy: module build scripts set `description` after this block runs.
                        description = providers.provider { project.description ?: 'ProtoMolt protobuf tooling' }
                        commonPomMetadata(it)
                    }
                }
                if (project.name == 'bom') {
                    create('catalog', MavenPublication) {
                        from components.versionCatalog
                        artifactId = 'protomolt-bom-catalog'
                        pom {
                            name = 'ProtoMolt BOM Catalog'
                            description = 'Gradle version catalog for ProtoMolt protobuf tools'
                            commonPomMetadata(it)
                        }
                    }
                }
            }
        }

        signing {
            def signingKey = System.getenv('GPG_PRIVATE_KEY')
            def signingPassword = System.getenv('GPG_PASSPHRASE')
            required { signingKey != null }
            if (signingKey) {
                useInMemoryPgpKeys(signingKey, signingPassword)
                sign publishing.publications
            }
        }
    }
}
