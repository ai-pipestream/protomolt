plugins {
    alias(libs.plugins.axion.release)
}

scmVersion {
    tag {
        prefix = 'v'
    }
    checks {
        uncommittedChanges = false
        aheadOfRemote = false
        snapshotDependencies = false
    }
}

allprojects {
    group = 'ai.pipestream'
    version = findProperty('publishVersion') ?: rootProject.scmVersion.version
}

tasks.register('bufLint', Exec) {
    group = 'verification'
    description = 'Run buf lint (STANDARD) on Pipestream protobuf standards'
    workingDir = rootDir
    commandLine 'buf', 'lint'
    inputs.files(fileTree(rootDir) {
        include 'buf.yaml'
        include '**/src/main/proto/**/*.proto'
        include '**/src/test/proto/**/*.proto'
        exclude '**/build/**'
    })
}

tasks.register('check') {
    group = 'verification'
    dependsOn('bufLint')
}

subprojects {
    repositories {
        mavenCentral()
    }

    if (project.name == 'bom') {
        apply plugin: 'java-platform'
        apply plugin: 'version-catalog'
    } else {
        apply plugin: 'java-library'

        java {
            toolchain {
                languageVersion = JavaLanguageVersion.of(25)
            }
        }

        // Library baseline is JDK 21: compile against the 21 API and emit 21 bytecode,
        // while the toolchain above lets contributors build and test on newer JDKs.
        tasks.withType(JavaCompile).configureEach {
            options.release = 21
        }

        tasks.withType(Test).configureEach {
            useJUnitPlatform()
            maxParallelForks = Math.max(1, Runtime.runtime.availableProcessors().intdiv(2))
        }

        // Generated protobuf sources have no javadoc tags; keep doclint useful but quiet.
        tasks.withType(Javadoc).configureEach {
            options.addStringOption('Xdoclint:all,-missing', '-quiet')
        }

        if (project.name != 'samples') {
            dependencies {
                testImplementation platform(libs.junit.bom)
                testImplementation libs.junit.jupiter
                testImplementation libs.assertj.core
                testRuntimeOnly libs.junit.platform.launcher
            }
        }
    }

    if (!['samples', 'system-tests'].contains(project.name)) {
        apply plugin: 'maven-publish'
        apply plugin: 'signing'

        if (project.name != 'bom') {
            java {
                withSourcesJar()
                withJavadocJar()
            }
        }

        publishing {
            publications {
                create('maven', MavenPublication) {
                    if (project.name == 'bom') {
                        from components.javaPlatform
                        artifactId = 'protomolt-bom'
                    } else {
                        from components.java
                    }
                    pom {
                        name = project.name == 'bom'
                            ? 'ProtoMolt BOM'
                            : project.name
                        // Lazy: module build scripts set `description` after this block runs.
                        description = providers.provider { project.description ?: 'ProtoMolt protobuf tooling' }
                        url = 'https://github.com/ai-pipestream/protomolt'
                        licenses {
                            license {
                                name = 'MIT License'
                                url = 'https://opensource.org/licenses/MIT'
                            }
                        }
                        scm {
                            connection = 'scm:git:https://github.com/ai-pipestream/protomolt.git'
                            developerConnection = 'scm:git:ssh://git@github.com/ai-pipestream/protomolt.git'
                            url = 'https://github.com/ai-pipestream/protomolt'
                        }
                    }
                }
                if (project.name == 'bom') {
                    create('catalog', MavenPublication) {
                        from components.versionCatalog
                        artifactId = 'protomolt-bom-catalog'
                        pom {
                            name = 'ProtoMolt BOM Catalog'
                            description = 'Gradle version catalog for ProtoMolt protobuf tools'
                            url = 'https://github.com/ai-pipestream/protomolt'
                        }
                    }
                }
            }
        }

        signing {
            def signingKey = System.getenv('GPG_PRIVATE_KEY')
            def signingPassword = System.getenv('GPG_PASSPHRASE')
            required { signingKey != null }
            if (signingKey) {
                useInMemoryPgpKeys(signingKey, signingPassword)
                sign publishing.publications
            }
        }
    }
}
