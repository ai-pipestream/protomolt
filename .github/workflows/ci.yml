name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Compilation is pinned to --release 21, but that alone does not prove the declared
  # Java 21 runtime baseline: this matrix runs every test JVM on 21 and on the current
  # JDK (the build itself always runs on the toolchain JDK).
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-jdk: ['21', '25']
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            ${{ matrix.test-jdk }}
            25

      - uses: gradle/actions/setup-gradle@v4

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Build and test
        run: ./gradlew build --console=plain -PtestJdk=${{ matrix.test-jdk }}

      # Excluded from `build` because the ACP SDK's client has been seen blocking
      # indefinitely when the machine is saturated by the parallel build. Run here on a
      # quiet machine, serially, so the coverage is kept rather than deleted. The client
      # still wedges even when quiet (a timeout in its response flux, different tests each
      # time), and a single retry has been observed to wedge too, so this allows three
      # attempts. A persistent failure still fails the job.
      - name: ACP protocol round trips
        run: |
          for attempt in 1 2 3; do
            ./gradlew :protomolt-acp:acpProtocolTest --rerun-tasks --console=plain \
              -PtestJdk=${{ matrix.test-jdk }} && exit 0
            echo "acpProtocolTest attempt ${attempt} failed"
          done
          exit 1

      - name: Buf lint
        run: buf lint

      - name: Buf breaking (PRs)
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=origin/${{ github.base_ref }}"

  # The console is a standalone vite app; its tests and production build run
  # here so a broken bundle fails CI even though the JVM build does not need it.
  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: console
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Install, test, typecheck, build
        run: |
          npm ci
          npm test
          npm run typecheck
          npm run build

  # Scores the validation executor against buf's own protovalidate-conformance
  # binary, so the documented full-suite pass rate is enforced on every push,
  # not just measured once.
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install protovalidate-conformance
        run: go install github.com/bufbuild/protovalidate/tools/protovalidate-conformance@v1.2.2

      - name: Build the conformance executor
        run: ./gradlew :protomolt-protobuf-validation-conformance:installDist --console=plain

      - name: Run the full conformance suite
        run: |
          protovalidate-conformance \
            protobuf/validation-conformance/build/install/protomolt-protobuf-validation-conformance/bin/protomolt-protobuf-validation-conformance

  # Runs the live-registry integration suites (Apicurio native v3, Apicurio
  # ccompat, and a genuine Confluent Schema Registry backed by Redpanda) that
  # a plain build skips when no registry is reachable.
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare the shared Iceberg warehouse volumes
        # The catalog container (uid 1000) and the test JVM (the runner user) share
        # these trees; both must be able to create entries under them. Gravitino gets
        # its own so the two catalogs never contend for one root.
        run: |
          mkdir -p /tmp/protomolt-iceberg-warehouse/client /tmp/protomolt-gravitino-warehouse/client
          chmod -R 777 /tmp/protomolt-iceberg-warehouse /tmp/protomolt-gravitino-warehouse

      - name: Start registries
        run: docker compose -f docker-compose.integration.yml up -d --wait

      - name: Run integration tests
        run: >
          ./gradlew :protomolt-schema-apicurio:test :protomolt-schema-confluent:test
          :protomolt-index-solr:test :protomolt-index-opensearch:test
          :protomolt-iceberg:test :protomolt-iceberg-s3:test :protomolt-connect-iceberg:test :protomolt-serde:test
          --rerun-tasks --console=plain

      - name: Fail if any integration suite skipped
        run: |
          skipped=$(grep -h -o 'skipped="[0-9]*"' \
            schema/apicurio/runtime/build/test-results/test/TEST-*Integration*.xml \
            schema/confluent/build/test-results/test/TEST-*Integration*.xml \
            index/solr/build/test-results/test/TEST-*Integration*.xml \
            index/opensearch/build/test-results/test/TEST-*Integration*.xml \
            lake/iceberg/build/test-results/test/TEST-*Integration*.xml \
            lake/iceberg-s3/build/test-results/test/TEST-*Integration*.xml \
            kafka/connect-iceberg/build/test-results/test/TEST-*Integration*.xml \
            kafka/serde/build/test-results/test/TEST-*Integration*.xml \
            | grep -o '[0-9]*' | paste -sd+ | bc)
          echo "skipped integration tests: $skipped"
          test "$skipped" -eq 0

      - name: Registry logs on failure
        if: failure()
        run: docker compose -f docker-compose.integration.yml logs

      - name: Gravitino server log on failure
        if: failure()
        # Gravitino logs the server to a file rather than stdout, so `compose logs` shows
        # only its start script; without this a failure there is undiagnosable from CI.
        continue-on-error: true
        run: |
          docker compose -f docker-compose.integration.yml exec -T gravitino-iceberg-rest \
            sh -c 'tail -200 logs/*.log' || true
