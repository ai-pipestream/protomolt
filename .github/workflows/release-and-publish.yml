# Cuts a versioned release. Everything is verified BEFORE the tag exists: the full JVM
# build and test suite, the console's tests, typecheck, and production build. Only then
# does axion tag v<semver>, and all module publications are signed and uploaded to Maven
# Central in one portal deployment from that same verified commit. Versioning is
# CICD-driven (release_type bump only, no hand-typed version), matching the other
# pipestream release workflows. A late failure can no longer leave a public tag or
# Central artifacts behind for a release that never finished verifying.
name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      # The root check task runs buf lint as part of the build.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      # ---- verify everything, tag nothing -------------------------------------------

      - name: Console tests, typecheck, and production build
        run: |
          cd apps/console
          npm ci
          npm test
          npm run typecheck
          npm run build

      - name: Full JVM build and test suite
        run: ./gradlew build --no-daemon --console=plain

      # Exercise the release-only task graph and the final Dockerfile while the
      # commit is still untagged. The tagged build below runs these tasks again
      # to produce correctly versioned archives.
      - name: Distribution and container preflight
        run: |
          ./gradlew :protomolt-serve:distZip :protomolt-serve:installDist \
            :protomolt-mcp:distZip :protomolt-connect:connectPluginZip \
            --no-daemon --console=plain
          docker build --tag protomolt-serve:release-preflight serve

      # ---- the commit is good; now make it a release --------------------------------

      - name: Map release_type to axion incrementer
        id: inc
        run: |
          case "${{ inputs.release_type }}" in
            major) echo "inc=incrementMajor" >> "$GITHUB_OUTPUT" ;;
            minor) echo "inc=incrementMinor" >> "$GITHUB_OUTPUT" ;;
            *)     echo "inc=incrementPatch" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Release (axion tag)
        run: ./gradlew release -Prelease.versionIncrementer=${{ steps.inc.outputs.inc }} --no-daemon

      - name: Resolve released version
        id: ver
        run: |
          V=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Released version: $V"

      - name: Build runnable distributions
        run: ./gradlew :protomolt-serve:distZip :protomolt-mcp:distZip :protomolt-connect:connectPluginZip --no-daemon

      - name: Publish signed artifacts to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --console=plain

      - name: Create GitHub release with runnable zips
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          gh release create "v$V" --title "ProtoMolt $V" --generate-notes \
            "apps/serve/build/distributions/protomolt-serve-$V.zip#protomolt-serve $V (run bin/protomolt-serve, JRE 21+)" \
            "surface/mcp/build/distributions/protomolt-mcp-$V.zip#protomolt-mcp $V (run bin/protomolt-mcp, JRE 21+)" \
            "sink/kafka/connect/build/distributions/protomolt-connect-plugin-$V.zip#protomolt-connect $V (Kafka Connect plugin, unzip onto plugin.path)"

  docker:
    needs: release
    uses: ./.github/workflows/docker-publish.yml
    permissions:
      contents: read
      packages: write
    with:
      version: ${{ needs.release.outputs.version }}
