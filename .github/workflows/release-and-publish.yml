# Cuts a versioned release: axion tags v<semver>, the full build and test suite
# runs against the tagged version, and all module publications are signed and
# uploaded to Maven Central in one portal deployment. Versioning is CICD-driven
# (release_type bump only, no hand-typed version), matching the other
# pipestream release workflows.
name: Release and Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Version bump'
        required: true
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - uses: gradle/actions/setup-gradle@v4

      # The root check task runs buf lint as part of the build.
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Map release_type to axion incrementer
        id: inc
        run: |
          case "${{ inputs.release_type }}" in
            major) echo "inc=incrementMajor" >> "$GITHUB_OUTPUT" ;;
            minor) echo "inc=incrementMinor" >> "$GITHUB_OUTPUT" ;;
            *)     echo "inc=incrementPatch" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Release (axion tag)
        run: ./gradlew release -Prelease.versionIncrementer=${{ steps.inc.outputs.inc }} --no-daemon

      - name: Resolve released version
        id: ver
        run: |
          V=$(git describe --tags --abbrev=0 | sed 's/^v//')
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Released version: $V"

      - name: Build and test
        run: ./gradlew build --no-daemon --console=plain

      - name: Publish signed artifacts to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./gradlew publishAggregationToCentralPortal --no-daemon --console=plain

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.ver.outputs.version }}"
          gh release create "v$V" --title "ProtoMolt $V" --generate-notes
