# Publishes the protomolt-serve container image to GHCR.
#
# Called from the release workflow with the released version (tagged semver +
# latest), or dispatched manually to publish `edge` from the chosen ref.
name: Docker Publish

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: Released semver (without the v prefix); tags semver + latest
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version != '' && inputs.version != null && format('v{0}', inputs.version) || github.ref }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/console/package-lock.json

      - name: Build the console
        run: |
          cd apps/console
          npm ci
          npm run build

      - name: Build the serve distribution
        run: ./gradlew :protomolt-serve:installDist --no-daemon

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tags
        id: tags
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tags=ghcr.io/${{ github.repository_owner }}/protomolt-serve:${{ inputs.version }},ghcr.io/${{ github.repository_owner }}/protomolt-serve:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=ghcr.io/${{ github.repository_owner }}/protomolt-serve:edge" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/serve
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=ProtoMolt one-process server: gRPC, REST/OpenAPI/Swagger, MCP, registry
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version != '' && inputs.version || 'edge' }}
