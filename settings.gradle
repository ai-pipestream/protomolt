include 'pipestream-proto-tools-jsonschema'
project(':pipestream-proto-tools-jsonschema').projectDir = file('http/jsonschema')

include 'pipestream-proto-tools-quarkus'
project(':pipestream-proto-tools-quarkus').projectDir = file('integrations/quarkus/runtime')

include 'pipestream-proto-tools-quarkus-deployment'
project(':pipestream-proto-tools-quarkus-deployment').projectDir = file('integrations/quarkus/deployment')

include 'pipestream-proto-tools-spring'
project(':pipestream-proto-tools-spring').projectDir = file('integrations/spring')

include 'pipestream-proto-tools-server-common'
project(':pipestream-proto-tools-server-common').projectDir = file('servers/common')

