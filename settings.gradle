pluginManagement {
    repositories {
        mavenLocal()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

rootProject.name = 'pipestream-proto-tools'

include 'bom'

include 'pipestream-proto-tools-descriptors'
project(':pipestream-proto-tools-descriptors').projectDir = file('core/descriptors')

include 'pipestream-proto-tools-helpers'
project(':pipestream-proto-tools-helpers').projectDir = file('core/helpers')

include 'pipestream-proto-tools-mapper-core'
project(':pipestream-proto-tools-mapper-core').projectDir = file('mapper/core')

include 'pipestream-proto-tools-mapper-cel'
project(':pipestream-proto-tools-mapper-cel').projectDir = file('mapper/cel')

include 'pipestream-proto-tools-metadata'
project(':pipestream-proto-tools-metadata').projectDir = file('mapper/metadata')

include 'pipestream-proto-tools-protobuf-metadata'
project(':pipestream-proto-tools-protobuf-metadata').projectDir = file('protobuf/metadata')

include 'pipestream-proto-tools-protobuf-validation'
project(':pipestream-proto-tools-protobuf-validation').projectDir = file('protobuf/validation')

include 'pipestream-proto-tools-protobuf-indexing'
project(':pipestream-proto-tools-protobuf-indexing').projectDir = file('protobuf/indexing')

include 'pipestream-proto-tools-schema-apicurio'
project(':pipestream-proto-tools-schema-apicurio').projectDir = file('schema/apicurio/runtime')

include 'pipestream-proto-tools-schema-apicurio-deployment'
