include 'pipestream-proto-tools-index-ndjson'
project(':pipestream-proto-tools-index-ndjson').projectDir = file('index/ndjson')

include 'pipestream-proto-tools-index-lucene'
project(':pipestream-proto-tools-index-lucene').projectDir = file('index/lucene')

include 'pipestream-proto-tools-index-opensearch'
project(':pipestream-proto-tools-index-opensearch').projectDir = file('index/opensearch')

include 'pipestream-proto-tools-index-solr'
project(':pipestream-proto-tools-index-solr').projectDir = file('index/solr')

include 'pipestream-proto-tools-json'
