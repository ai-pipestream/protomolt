plugins {
    alias(libs.plugins.protobuf)
}

description = 'JSON Schema (draft 2020-12) generation from protobuf descriptors and validation constraints'

dependencies {
    api project(':protomolt-protobuf-validation')
    implementation libs.jackson.databind

    testImplementation libs.protobuf.java.util
    // Validates JsonFormat-printed documents against the generated schemas in tests.
    testImplementation 'com.networknt:json-schema-validator:1.5.9'
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:4.35.1"
    }
}
