plugins {
    id 'application'
}

description = 'One-process launcher: ProtoMoltService over gRPC with reflection, the same verbs over JSON/REST with OpenAPI and Swagger UI, MCP on streamable HTTP, and an optional git-backed registry'

dependencies {
    api project(':protomolt-grpc-service')

    implementation project(':protomolt-json')
    implementation project(':protomolt-mcp')
    implementation project(':protomolt-chain')
    implementation project(':protomolt-proto-sources')
    implementation project(':protomolt-protobuf-validation')
    implementation project(':protomolt-protobuf-metadata')
    implementation project(':protomolt-index-spi')
    implementation project(':protomolt-rest')
    implementation project(':protomolt-openapi')
    implementation project(':protomolt-server-jdk')
    implementation project(':protomolt-registry')
    implementation project(':protomolt-registry-server')
    implementation libs.protobuf.java.util
    implementation libs.swagger.ui

    runtimeOnly libs.slf4j.simple

    testImplementation project(':protomolt-grpc-invoke')
    testImplementation libs.grpc.inprocess
    testImplementation libs.testcontainers.junit.jupiter
}

// ContainerSmokeIntegrationTest docker-builds apps/serve/Dockerfile, whose context COPYs the
// installDist output. The Dockerfile is a declared input so editing it re-runs the suite;
// dependsOn alone is ordering and would leave a Dockerfile-only change stale-green.
tasks.named('test') {
    dependsOn 'installDist'
    inputs.file('Dockerfile')
}

application {
    mainClass = 'ai.pipestream.proto.serve.ProtoMoltServe'
}

// Bundle the console's built assets when they exist (cd apps/console && npm run
// build); without them the server still builds and /console explains itself.
processResources {
    into('ai/pipestream/proto/serve/console') {
        from("${rootDir}/apps/console/dist")
    }
}
