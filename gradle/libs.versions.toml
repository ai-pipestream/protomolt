[versions]
protobuf = "4.35.1"
cel = "0.13.1"
junit = "6.1.1"
assertj = "3.27.7"
slf4j = "2.0.18"
kafka = "3.9.1"
swagger-ui = "5.25.3"
jackson = "2.22.1"
quarkus = "3.37.2"
axion-release = "1.21.2"
nmcp = "1.6.1"
