// Test fixture: a document that declares its own quality dimensions.
syntax = "proto3";

package ai.pipestream.proto.quality.testdata.v1;

import "ai/pipestream/proto/quality/v1/quality.proto";

option java_package = "ai.pipestream.proto.quality.testdata";
option java_multiple_files = true;

message ScoredDoc {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "completeness"
      cel: "(this.title != '' ? 0.5 : 0.0) + (this.author != '' ? 0.5 : 0.0)"
    }
    dimension: {
      id: "body"
      weight: 2.0
      cel: "clamp(double(this.body.size()) / 100.0, 0.0, 1.0)"
    }
    dimension: {
      id: "has_title"
      cel: "this.title != ''"
    }
    dimension: {
      // Integer division: errors at evaluation when divisor is zero, which is the point.
      id: "fragile"
      cel: "double(2 / this.divisor) / 4.0"
    }
  };

  string title = 1;
  string author = 2;
  string body = 3;
  int32 divisor = 4;
}

message Unscored {
  string anything = 1;
}

message DuplicateDimensionIds {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "completeness"
      cel: "this.present != '' ? 1.0 : 0.0"
    }
    dimension: {
      id: "completeness"
      cel: "0.0"
    }
  };
  string present = 1;
}

message BrokenRules {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "bad"
      cel: "this.no_such_field > 1"
    }
  };
  string present = 1;
}

message MissingDimensionId {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      cel: "this.present != '' ? 1.0 : 0.0"
    }
  };
  string present = 1;
}

message MissingCelExpression {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "completeness"
    }
  };
  string present = 1;
}

message NegativeWeight {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "completeness"
      weight: -1.0
      cel: "this.present != '' ? 1.0 : 0.0"
    }
  };
  string present = 1;
}

// Exercises the exp() helper: a recency decay curve, the case it exists for.
message DecayingDoc {
  option (ai.pipestream.proto.quality.v1.quality) = {
    dimension: {
      id: "recency"
      cel: "exp(-double(this.age_days) / 10.0)"
    }
  };
  int32 age_days = 1;
}
