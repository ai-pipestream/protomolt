syntax = "proto3";

package ai.pipestream.proto.meta.testdata.v1;

option java_multiple_files = true;
option java_package = "ai.pipestream.proto.meta.testdata";

import "ai/pipestream/proto/meta/v1/metadata.proto";

message AnnotatedDoc {
  option (ai.pipestream.proto.meta.v1.message) = {
    description: "Search document"
    owner: "search-platform"
    sensitivity: "internal"
    labels: {
      key: "domain"
      value: "docs"
    }
  };

  string doc_id = 1 [(ai.pipestream.proto.meta.v1.field) = {
    description: "Stable document id"
    display_name: "Document ID"
    sensitivity: "public"
    labels: {
      key: "role"
      value: "id"
    }
  }];

  string title = 2 [(ai.pipestream.proto.meta.v1.field) = {
    description: "Display title"
    owner: "content"
    sensitivity: "public"
  }];
}

// Fixtures for SensitivityMasker: sensitive scalars, maps in every position the
// masker must reach, and message values nested inside maps.
message SecretNote {
  string body = 1 [(ai.pipestream.proto.meta.v1.field) = {sensitivity: "pii"}];
  string label = 2;
}

message MaskerDoc {
  string name = 1;
  string email = 2 [(ai.pipestream.proto.meta.v1.field) = {sensitivity: "pii"}];
  bytes token = 3 [(ai.pipestream.proto.meta.v1.field) = {sensitivity: "secret"}];
  map<string, string> plain_attrs = 4;
  map<string, string> secret_attrs = 5
      [(ai.pipestream.proto.meta.v1.field) = {sensitivity: "pii"}];
  map<string, SecretNote> notes = 6;
  map<string, MaskerDoc> children = 7;
  repeated SecretNote entries = 8;
  map<string, int64> counts = 9
      [(ai.pipestream.proto.meta.v1.field) = {sensitivity: "pii"}];
}
