syntax = "proto3";

package ai.pipestream.proto.validate.conformance.testdata.v1;

import "buf/validate/validate.proto";

// Leading dot on the extension name forces top-level resolution regardless of the enclosing
// package, matching the convention used by the validation-buf test fixtures.

message Person {
  int32 age = 1 [(.buf.validate.field).int32.gte = 18];
  string name = 2 [(.buf.validate.field).string.min_len = 2];
  repeated string tags = 3 [(.buf.validate.field).repeated.min_items = 1];
  repeated string codes = 4 [(.buf.validate.field).repeated.items.string.min_len = 3];
  map<string, int32> scores = 5 [(.buf.validate.field).map.values.int32.gte = 0];
  map<string, int32> limited = 6 [(.buf.validate.field).map.max_pairs = 2];

  // Unannotated maps, present only to exercise integer/bool key-type parsing in FieldPaths.
  map<int64, string> ledger = 7;
  map<uint32, string> counts = 8;
  map<bool, string> flags = 9;

  // Combined-range rules: normal (between) and reversed (outside/exclusive).
  // optional so an unset value is skipped and only the case under test is validated.
  optional int32 ranged = 10 [(.buf.validate.field).int32 = {gt: 10, lt: 100}];
  optional int32 wrapped = 11 [(.buf.validate.field).int32 = {gt: 100, lt: 10}];
}

message Signup {
  Person person = 1 [(.buf.validate.field).required = true];
}
