syntax = "proto3";

package ai.pipestream.proto.validate.testdata.v1;

option java_multiple_files = true;
option java_package = "ai.pipestream.proto.validate.testdata";

import "ai/pipestream/proto/validate/v1/validate.proto";

message Person {
  option (ai.pipestream.proto.validate.v1.message) = {
    cel: {
      id: "adult.name"
      message: "adults need names of length >= 3"
      expression: "this.age < 18 || this.name.size() >= 3"
    }
  };

  optional string name = 1 [(ai.pipestream.proto.validate.v1.field) = {
    required: true
    string: { min_len: 2, max_len: 40 }
  }];

  optional int32 age = 2 [(ai.pipestream.proto.validate.v1.field) = {
    int32: { gte: 0, lte: 150 }
  }];

  optional string email = 3 [(ai.pipestream.proto.validate.v1.field) = {
    string: { email: true }
    cel: {
      id: "email.not_localhost"
      message: "localhost emails are forbidden"
      expression: "!this.endsWith('@localhost')"
    }
  }];
}
