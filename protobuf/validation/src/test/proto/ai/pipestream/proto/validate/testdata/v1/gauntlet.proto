syntax = "proto3";

package ai.pipestream.proto.validate.testdata.v1;

option java_multiple_files = true;
option java_package = "ai.pipestream.proto.validate.testdata";

import "ai/pipestream/proto/validate/v1/validate.proto";
import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

// One field per rule so each test exercises a single constraint; unset fields
// are skipped by presence semantics (collections excepted).

message StringGauntlet {
  optional string exact = 1 [(ai.pipestream.proto.validate.v1.field) = {
    string: { const: "fixed" }
  }];
  optional string three = 2 [(ai.pipestream.proto.validate.v1.field) = {
    string: { len: 3 }
  }];
  optional string affixed = 3 [(ai.pipestream.proto.validate.v1.field) = {
    string: { prefix: "pre", suffix: "fix", contains: "mid", not_contains: "bad" }
  }];
  optional string choice = 4 [(ai.pipestream.proto.validate.v1.field) = {
    string: { in: "red", in: "green" }
  }];
  optional string veto = 5 [(ai.pipestream.proto.validate.v1.field) = {
    string: { not_in: "nope" }
  }];
  optional string id = 6 [(ai.pipestream.proto.validate.v1.field) = {
    string: { uuid: true }
  }];
  optional string host = 7 [(ai.pipestream.proto.validate.v1.field) = {
    string: { hostname: true }
  }];
  optional string link = 8 [(ai.pipestream.proto.validate.v1.field) = {
    string: { uri: true }
  }];
  optional string addr = 9 [(ai.pipestream.proto.validate.v1.field) = {
    string: { ip: true }
  }];
  optional string addr4 = 10 [(ai.pipestream.proto.validate.v1.field) = {
    string: { ipv4: true }
  }];
  optional string addr6 = 11 [(ai.pipestream.proto.validate.v1.field) = {
    string: { ipv6: true }
  }];
}

message NumberGauntlet {
  optional uint32 small = 1 [(ai.pipestream.proto.validate.v1.field) = {
    uint32: { lte: 10 }
  }];
  optional uint64 big = 2 [(ai.pipestream.proto.validate.v1.field) = {
    uint64: { gt: 5 }
  }];
  optional int32 exact = 3 [(ai.pipestream.proto.validate.v1.field) = {
    int32: { const: 7 }
  }];
  optional int64 choice = 4 [(ai.pipestream.proto.validate.v1.field) = {
    int64: { in: 1, in: 2 }
  }];
  optional int32 veto = 5 [(ai.pipestream.proto.validate.v1.field) = {
    int32: { not_in: 13 }
  }];
  optional double finite = 6 [(ai.pipestream.proto.validate.v1.field) = {
    double: { finite: true }
  }];
  optional float ranged = 7 [(ai.pipestream.proto.validate.v1.field) = {
    float: { gte: 0.5, lt: 2.5 }
  }];
  optional sint32 negative = 8 [(ai.pipestream.proto.validate.v1.field) = {
    int32: { lt: 0 }
  }];
  optional fixed64 fixed = 9 [(ai.pipestream.proto.validate.v1.field) = {
    uint64: { lte: 100 }
  }];
}

enum Rank {
  RANK_UNSPECIFIED = 0;
  RANK_BRONZE = 1;
  RANK_SILVER = 2;
  RANK_BANNED = 3;
}

message MiscGauntlet {
  optional bool accepted = 1 [(ai.pipestream.proto.validate.v1.field) = {
    bool: { const: true }
  }];
  optional bytes payload = 2 [(ai.pipestream.proto.validate.v1.field) = {
    bytes: { min_len: 2, max_len: 4 }
  }];
  optional bytes framed = 3 [(ai.pipestream.proto.validate.v1.field) = {
    bytes: { prefix: "\001", suffix: "\377", contains: "B" }
  }];
  optional bytes token = 4 [(ai.pipestream.proto.validate.v1.field) = {
    bytes: { len: 3 }
  }];
  optional Rank rank = 5 [(ai.pipestream.proto.validate.v1.field) = {
    enum: { defined_only: true, not_in: 3 }
  }];
  optional Rank fixed_rank = 6 [(ai.pipestream.proto.validate.v1.field) = {
    enum: { const: 2 }
  }];
  optional Rank listed_rank = 7 [(ai.pipestream.proto.validate.v1.field) = {
    enum: { in: 1, in: 2 }
  }];
}

message Widget {
  optional string name = 1 [(ai.pipestream.proto.validate.v1.field) = {
    required: true
  }];
}

message RepeatedGauntlet {
  repeated string tags = 1 [(ai.pipestream.proto.validate.v1.field) = {
    repeated: {
      min_items: 1
      max_items: 3
      unique: true
      items: { string: { min_len: 2 } }
    }
  }];
  repeated int32 ports = 2 [(ai.pipestream.proto.validate.v1.field) = {
    repeated: { items: { int32: { gte: 1024, lte: 65535 } } }
  }];
  repeated Widget widgets = 3;
}

message MapGauntlet {
  map<string, int32> scores = 1 [(ai.pipestream.proto.validate.v1.field) = {
    map: {
      min_pairs: 1
      max_pairs: 2
      keys: { string: { min_len: 2 } }
      values: { int32: { gte: 0 } }
    }
  }];
  map<string, Widget> parts = 2;
}

message TimeGauntlet {
  google.protobuf.Timestamp past = 1 [(ai.pipestream.proto.validate.v1.field) = {
    timestamp: { lt_now: true }
  }];
  google.protobuf.Timestamp future = 2 [(ai.pipestream.proto.validate.v1.field) = {
    timestamp: { gt_now: true }
  }];
  google.protobuf.Timestamp epoch_window = 3 [(ai.pipestream.proto.validate.v1.field) = {
    timestamp: { gte: { seconds: 0 }, lt: { seconds: 1000000 } }
  }];
  google.protobuf.Timestamp recent = 4 [(ai.pipestream.proto.validate.v1.field) = {
    timestamp: { within: { seconds: 3600 } }
  }];
  google.protobuf.Duration timeout = 5 [(ai.pipestream.proto.validate.v1.field) = {
    duration: { gte: { seconds: 1 }, lte: { seconds: 60 } }
  }];
  google.protobuf.Duration strict = 6 [(ai.pipestream.proto.validate.v1.field) = {
    duration: { gt: { nanos: 500 }, lt: { seconds: 1 } }
  }];
}
