// The ProtoMolt action catalog as a gRPC service.
//
// Every verb in the catalog is a typed RPC here. The canonical proto3 JSON
// form of each message is exactly the action's JSON envelope, so the same
// call works identically over gRPC, over the JSON/REST gateway, and as an
// MCP tool.
//
// ProtoMolt serves this file descriptor-natively: the runtime compiles this
// source with its own compiler and binds the service with dynamic messages.
// There are no generated stubs on the server side; clients may generate
// theirs with the GenerateStubs RPC below.
syntax = "proto3";

package ai.pipestream.protomolt.v1;

import "google/protobuf/struct.proto";

// The ProtoMolt toolkit: compile, introspect, validate, diff, render,
// evaluate, map, reflect, invoke, and generate — one service.
service ProtoMoltService {
  // Compiles inline .proto sources to a serialized FileDescriptorSet.
  // Compilation failures return ok=false with diagnostics, not an error.
  rpc Compile(CompileRequest) returns (CompileResponse);

  // Lists the types in a schema (or the shared registry when no schema is
  // given) — the grounding verb: call it first to discover exact names.
  rpc ListTypes(ListTypesRequest) returns (ListTypesResponse);

  // Validates a message against the validation rules declared on its schema.
  rpc ValidateMessage(ValidateMessageRequest) returns (ValidateMessageResponse);

  // Reports every change between two schema versions as typed entries.
  rpc DiffSchemas(DiffSchemasRequest) returns (DiffSchemasResponse);

  // Checks the new schema against the old under a compatibility mode.
  rpc CheckCompat(CheckCompatRequest) returns (CheckCompatResponse);

  // Renders the JSON Schema (draft 2020-12) for a message type. The response
  // is the schema document itself.
  rpc RenderJsonSchema(RenderJsonSchemaRequest) returns (google.protobuf.Struct);

  // Renders the search-index artifact for a message type from its indexing
  // hints. The response shape is engine-specific (OpenSearch mappings, Solr
  // schema pieces, or Lucene field specs).
  rpc RenderIndexMappings(RenderIndexMappingsRequest) returns (google.protobuf.Struct);

  // Evaluates a CEL expression against a message bound as 'input'.
  rpc EvalCel(EvalCelRequest) returns (EvalCelResponse);

  // Transforms a message with text mapping rules and/or CEL rules.
  rpc MapMessage(MapMessageRequest) returns (MapMessageResponse);

  // Extracts the declared metadata bag for a message type.
  rpc ExtractMetadata(ExtractMetadataRequest) returns (ExtractMetadataResponse);

  // Synthesizes a join or union output shape — envelope, projection, or
  // tagged union — from named source types, returning registrable proto
  // source and the implied mapping rules.
  rpc SynthesizeShape(SynthesizeShapeRequest) returns (SynthesizeShapeResponse);

  // Joins named source messages into one output message: an authored target
  // populated by scoped rules, or a shape synthesized on the fly.
  rpc JoinMessages(JoinMessagesRequest) returns (JoinMessagesResponse);

  // Merges the fields of two or more message types into one new type: a
  // clash report first, caller-decided resolutions, then the merged proto
  // plus its join and union mapping rules in one move.
  rpc MergeSchemas(MergeSchemasRequest) returns (MergeSchemasResponse);

  // Statically validates mapping rules and CEL expressions (filters must be
  // boolean) against descriptors; with sample messages, also dry-runs them.
  rpc CheckRules(CheckRulesRequest) returns (CheckRulesResponse);

  // Struct-to-proto: infers a message type from JSON sample documents and
  // returns registrable proto source plus the linked descriptor set.
  rpc InferSchema(InferSchemaRequest) returns (InferSchemaResponse);

  // Masks fields by their schema-declared sensitivity classes
  // (ai.pipestream.proto.meta.v1.field.sensitivity).
  rpc MaskMessage(MaskMessageRequest) returns (MaskMessageResponse);

  // Executes an inline chain: serial typed gRPC calls, each request mapped
  // from the chain input and every prior step's response.
  rpc RunChain(RunChainRequest) returns (RunChainResponse);

  // Statically verifies a chain: methods resolve and are unary, every
  // mapping and CEL expression type-checks at each step's scope.
  rpc CheckChain(CheckChainRequest) returns (CheckChainResponse);

  // Fetches a live gRPC server's schema over server reflection, given only
  // its address. Servers without reflection return ok=false.
  rpc Reflect(ReflectRequest) returns (ReflectResponse);

  // Invokes a unary or server-streaming method on a live gRPC server with no
  // generated stubs. gRPC status failures return ok=false with the status
  // name rather than an error.
  rpc GrpcInvoke(GrpcInvokeRequest) returns (GrpcInvokeResponse);

  // Generates client/message source code from a schema with protoc compiled
  // to WebAssembly — no native toolchain on the server.
  rpc GenerateStubs(GenerateStubsRequest) returns (GenerateStubsResponse);

  // Gathers .proto sources from a git repository and compiles them — the
  // lane for services that publish their contract instead of reflecting.
  rpc GatherGit(GatherGitRequest) returns (GatherGitResponse);

  // Renders a schema as an Open Knowledge Format (OKF v0.1) bundle: markdown
  // concept documents with YAML frontmatter for every message, enum, and
  // service, cross-linked into the knowledge graph agents and catalogs read.
  rpc EmitOkf(EmitOkfRequest) returns (EmitOkfResponse);
}

// A schema source. Provide exactly one of 'type', 'sources', or
// 'descriptor_set_base64'; 'root' optionally names the entry file within
// 'sources'.
message SchemaSource {
  // Fully qualified message name resolved from the shared descriptor
  // registry, e.g. 'google.protobuf.Struct'.
  string type = 1;

  // Inline .proto files keyed by import path; compiled per call.
  map<string, string> sources = 2;

  // Optional entry file within 'sources'.
  string root = 3;

  // Base64-encoded serialized google.protobuf.FileDescriptorSet.
  string descriptor_set_base64 = 4;
}

message CompileRequest {
  // The .proto files to compile, keyed by import path.
  map<string, string> sources = 1;
}

message CompileResponse {
  bool ok = 1;
  // Compiler diagnostics when ok=false.
  repeated string errors = 2;
  // Compiled file names when ok=true.
  repeated string files = 3;
  string descriptor_set_base64 = 4;
}

message ListTypesRequest {
  // Optional; without it the shared descriptor registry is listed.
  SchemaSource schema = 1;
  // Case-insensitive substring filter on the fully qualified name.
  string filter = 2;
}

message TypeField {
  string name = 1;
  int32 number = 2;
  // Wire type, lowercase (e.g. 'string', 'int64', 'message').
  string type = 3;
  // Full name of the message or enum type, when applicable.
  string type_name = 4;
  string label = 5;
}

message TypeEntry {
  string full_name = 1;
  string file = 2;
  // 'message', 'enum', or 'service'.
  string kind = 3;
  // Field shapes; present for messages.
  repeated TypeField fields = 4;
}

message ListTypesResponse {
  repeated TypeEntry types = 1;
}

message ValidateMessageRequest {
  SchemaSource schema = 1;
  // Fully qualified type to validate against; required unless the schema
  // identifies a single message.
  string type = 2;
  // The message as canonical proto3 JSON.
  google.protobuf.Struct message = 3;
}

message Violation {
  string field = 1;
  string rule = 2;
  string rule_id = 3;
  string message = 4;
}

message ValidateMessageResponse {
  bool valid = 1;
  repeated Violation violations = 2;
}

message DiffSchemasRequest {
  SchemaSource old = 1;
  SchemaSource new = 2;
}

message SchemaChange {
  string rule_id = 1;
  string path = 2;
  string before = 3;
  string after = 4;
  string message = 5;
  repeated string impacts = 6;
}

message DiffSchemasResponse {
  repeated SchemaChange changes = 1;
}

message CheckCompatRequest {
  SchemaSource old = 1;
  SchemaSource new = 2;
  // NONE, BACKWARD, FORWARD, FULL, or a _TRANSITIVE variant; defaults to
  // BACKWARD.
  string mode = 3;
  bool include_json_rules = 4;
  bool include_source_rules = 5;
}

message CheckCompatResponse {
  bool compatible = 1;
  string mode = 2;
  repeated SchemaChange violations = 3;
  repeated SchemaChange changes = 4;
}

message RenderJsonSchemaRequest {
  SchemaSource schema = 1;
  string type = 2;
}

message RenderIndexMappingsRequest {
  SchemaSource schema = 1;
  string type = 2;
  // 'opensearch', 'solr', or 'lucene'.
  string engine = 3;
}

message EvalCelRequest {
  SchemaSource schema = 1;
  string type = 2;
  // The message bound as the CEL variable 'input', as proto3 JSON.
  google.protobuf.Struct message = 3;
  string expression = 4;
}

message EvalCelResponse {
  google.protobuf.Value result = 1;
  // A short type label: 'string', 'int', 'bool', 'list', 'map',
  // 'message:<full.Name>', ...
  string result_type = 2;
}

message CelRule {
  // Optional boolean CEL gate; the rule is skipped when false.
  string filter = 1;
  // Optional CEL value expression written to 'target'.
  string selector = 2;
  string target = 3;
  // Text rules applied when no selector is given.
  repeated string fallback = 4;
}

message MapMessageRequest {
  SchemaSource schema = 1;
  string type = 2;
  google.protobuf.Struct message = 3;
  // Text rules applied in order: 'target = source.path',
  // 'target += source.path', '-field.to.clear'.
  repeated string rules = 4;
  // CEL rules applied after 'rules'.
  repeated CelRule cel_rules = 5;
}

message MapMessageResponse {
  // The transformed message as proto3 JSON.
  google.protobuf.Struct message = 1;
}

message ExtractMetadataRequest {
  SchemaSource schema = 1;
  string type = 2;
}

message ExtractMetadataResponse {
  string type = 1;
  // Flat bag keyed 'message.*' and 'field.<name>.*'.
  google.protobuf.Struct metadata = 2;
}

message ReflectRequest {
  // gRPC target, e.g. 'localhost:9090' or 'dns:///svc:443'.
  string target = 1;
  // Default 15000.
  int32 deadline_ms = 2;
  // Connect with TLS (system trust roots); plaintext by default.
  bool tls = 3;
}

message ReflectResponse {
  bool ok = 1;
  repeated string services = 2;
  // Usable directly as SchemaSource.descriptor_set_base64.
  string descriptor_set_base64 = 3;
  int32 file_count = 4;
  // Why reflection failed, when ok=false.
  string error = 5;
}

message GrpcInvokeRequest {
  string target = 1;
  // Fully qualified 'package.Service/Method'.
  string method = 2;
  // Must declare the target service.
  SchemaSource schema = 3;
  // The request message as canonical proto3 JSON.
  google.protobuf.Struct request = 4;
  // Optional ASCII request headers.
  map<string, string> metadata = 5;
  // Default 15000.
  int32 deadline_ms = 6;
  // Cap on collected server-streaming responses; default 64.
  int32 max_responses = 7;
  // Connect with TLS (system trust roots); plaintext by default.
  bool tls = 8;
}

message GrpcInvokeResponse {
  string method = 1;
  // UNARY or SERVER_STREAMING.
  string method_type = 2;
  bool ok = 3;
  // The gRPC status name, 'OK' on success.
  string status = 4;
  // Response messages as proto3 JSON.
  repeated google.protobuf.Struct responses = 5;
  // Status detail, when the call failed.
  string description = 6;
}

message GenerateStubsRequest {
  SchemaSource schema = 1;
  // 'java', 'kotlin', 'grpc-java', 'python', 'cpp', 'csharp', 'ruby', 'php',
  // 'objc'; defaults to ['java'].
  repeated string generators = 2;
  // Proto file paths to generate for; defaults to every non-google file.
  repeated string files = 3;
  // Optional generator parameter, as protoc's --<gen>_opt.
  string parameter = 4;
}

message GeneratedFile {
  string name = 1;
  string generator = 2;
  string content = 3;
}

message GenerateStubsResponse {
  bool ok = 1;
  repeated GeneratedFile files = 2;
  int32 file_count = 3;
  // The generator that failed, when ok=false.
  string generator = 4;
  string error = 5;
}

message GatherGitRequest {
  // Git repository URL (https or ssh).
  string repo = 1;
  // Branch, tag, or commit SHA; default 'main'.
  string ref = 2;
  // Specific files or directories relative to 'subdir'; default: every
  // .proto under 'subdir'.
  repeated string paths = 3;
  // Directory import paths are relative to; default 'proto', '.' for root.
  string subdir = 4;
}

message GatherGitResponse {
  bool ok = 1;
  // Why the gather or compile failed, when ok=false.
  string error = 2;
  repeated string files = 3;
  // Source texts keyed by import path — registerable as registry subjects.
  map<string, string> sources = 4;
  // Usable directly as SchemaSource.descriptor_set_base64.
  string descriptor_set_base64 = 5;
}

message EmitOkfRequest {
  SchemaSource schema = 1;
  // Heading of the bundle's root index.md; default 'Schema knowledge bundle'.
  string title = 2;
}

message EmitOkfResponse {
  bool ok = 1;
  string error = 2;
  int32 file_count = 3;
  // Every bundle file: markdown text keyed by bundle-relative path.
  map<string, string> files = 4;
  // The same bundle as one zip archive.
  string zip_base64 = 5;
}

// A named source type (and, for joins, its message) in shape order; the
// name becomes the scope name rules reference and the synthesized field or
// case name.
message ShapeSource {
  string name = 1;
  SchemaSource schema = 2;
  // Fully qualified message type; required unless the schema identifies one.
  string type = 3;
  // join-messages only: the source message as proto3 JSON.
  google.protobuf.Struct message = 4;
}

// A projected field: its type is inferred from the scoped source path.
message ProjectedField {
  string name = 1;
  // e.g. 'order.ship_to.city'.
  string from = 2;
}

message SynthesizeShapeRequest {
  // 'envelope', 'projection', or 'union'.
  string mode = 1;
  // Fully qualified name of the synthesized message.
  string name = 2;
  repeated ShapeSource sources = 3;
  // Projection only.
  repeated ProjectedField fields = 4;
}

message SynthesizeShapeResponse {
  string type = 1;
  // Import path of the synthesized file.
  string file = 2;
  // Registrable proto source; imports carry the sources' true paths.
  string proto_source = 3;
  // Self-contained, dependency-ordered descriptor set.
  string descriptor_set_base64 = 4;
  // The rules the shape implies (projection and envelope).
  repeated string implied_rules = 5;
}

// The authored output type of a join.
message JoinTarget {
  SchemaSource schema = 1;
  string type = 2;
}

// A shape to synthesize as the join output.
message JoinShape {
  // 'envelope', 'projection', or 'union'.
  string mode = 1;
  string name = 2;
  repeated ProjectedField fields = 3;
}

message JoinMessagesRequest {
  repeated ShapeSource sources = 1;
  // Exactly one of 'target' or 'shape'.
  JoinTarget target = 2;
  JoinShape shape = 3;
  // Scoped text rules: 'target.path = source.path', '+=', '-clear'.
  repeated string rules = 4;
  // CEL rules applied after 'rules'; expressions see each source by name
  // plus 'target', the progressive output.
  repeated CelRule cel_rules = 5;
}

message JoinMessagesResponse {
  string type = 1;
  // The joined message as proto3 JSON.
  google.protobuf.Struct message = 2;
  // Present when the shape was synthesized.
  string descriptor_set_base64 = 3;
  string proto_source = 4;
}

// A caller's decision for a clashing field name in merge-schemas.
message MergeResolution {
  // 'rename', 'prefer', or 'coalesce'.
  string action = 1;
  // prefer: the source whose field wins.
  string source = 2;
  // rename: new field name per source; missing entries default to
  // '<source>_<field>'.
  map<string, string> names = 3;
}

message MergeSchemasRequest {
  // Fully qualified name of the merged message.
  string name = 1;
  // Two or more; for coalesced singular fields, later sources overwrite
  // earlier ones at join time. 'message' is unused here.
  repeated ShapeSource sources = 2;
  // Keyed by clashing field name.
  map<string, MergeResolution> resolutions = 3;
  // Return only the clash report, even when the merge is clean.
  bool report_only = 4;
}

// One source's contribution to a clashing field name.
message ClashOrigin {
  string source = 1;
  // Proto keyword or full type name, 'repeated '-prefixed when repeated.
  string type = 2;
}

message MergeClash {
  string field = 1;
  // 'coalesced' (info: same type, merged into one field - the natural join
  // keys), 'type-clash', or 'cardinality-clash'.
  string kind = 2;
  repeated ClashOrigin origins = 3;
  MergeResolution suggested = 4;
}

message MergeSchemasResponse {
  // False while hard clashes await resolutions (or report_only was set);
  // the emission fields below are present only when true.
  bool resolved = 1;
  repeated MergeClash clashes = 2;
  string type = 3;
  // Import path of the merged file.
  string file = 4;
  // Registrable proto source; imports carry the sources' true paths.
  string proto_source = 5;
  string descriptor_set_base64 = 6;
  // The defined join: one ruleset reading every source at once.
  repeated string join_rules = 7;
  // The defined union: one ruleset per source, mapping it alone onto the
  // merged shape.
  map<string, MergeRuleList> union_rules = 8;
}

message MergeRuleList {
  repeated string rules = 1;
}

message CheckRulesRequest {
  // One source (in-place mode: unscoped paths, the name is the CEL variable)
  // or many (scoped mode). A 'message' on every source enables the dry run.
  repeated ShapeSource sources = 1;
  // The output type rules write to; required with multiple sources.
  JoinTarget target = 2;
  repeated string rules = 3;
  repeated CelRule cel_rules = 4;
  // Boolean CEL predicates.
  repeated string filters = 5;
}

message RuleFinding {
  // 'rule', 'celRule', or 'filter'.
  string kind = 1;
  int32 index = 2;
  string rule = 3;
  string error = 4;
}

message CheckRulesResponse {
  bool ok = 1;
  repeated RuleFinding findings = 2;
  // Dry-run results, present when every source carried a sample message
  // and the static pass was clean.
  string type = 3;
  google.protobuf.Struct message = 4;
  repeated bool filter_results = 5;
  // A dynamic failure the static pass could not see (e.g. a Struct path).
  string dry_run_error = 6;
}

// One step of a chain: a unary call whose request is mapped from the chain
// scope ('input' plus every prior step's response, by step name).
message ChainStep {
  string name = 1;
  // gRPC target, e.g. 'host:9090'.
  string target = 2;
  // Use TLS; default plaintext.
  bool tls = 3;
  // 'package.Service/Method'; must be unary.
  string method = 4;
  // Boolean CEL gate; a false skips the step.
  string when = 5;
  // Scoped rules building the request message.
  repeated string rules = 6;
  repeated CelRule cel_rules = 7;
  // Validate the response against its declared rules before proceeding.
  bool validate = 8;
  // Per-step deadline, bounded by what remains of the chain's.
  int32 deadline_ms = 9;
}

// The chain's output mapping; without it the last step's response returns.
message ChainOutput {
  string type = 1;
  repeated string rules = 2;
  repeated CelRule cel_rules = 3;
}

message ChainDefinition {
  string name = 1;
  // Declares every step's service and message types (e.g. from reflect,
  // gather-git, or a registry descriptor set).
  SchemaSource schema = 2;
  string input_type = 3;
  // Overall deadline; default 30000.
  int32 deadline_ms = 4;
  repeated ChainStep steps = 5;
  ChainOutput output = 6;
}

message RunChainRequest {
  ChainDefinition chain = 1;
  // The chain input, as proto3 JSON of input_type.
  google.protobuf.Struct input = 2;
  // A stored chain to run instead of an inline 'chain' (registered via the
  // registry's chains endpoint).
  string chain_name = 3;
}

message ChainStepResult {
  string name = 1;
  bool skipped = 2;
}

message RunChainResponse {
  bool ok = 1;
  string output_type = 2;
  google.protobuf.Struct output = 3;
  repeated ChainStepResult steps = 4;
  // When ok=false: which step failed and why (gRPC status, gate error, or
  // validation violations).
  string failed_step = 5;
  string error = 6;
}

message CheckChainRequest {
  ChainDefinition chain = 1;
}

message ChainFinding {
  // The step name, or '' for chain-level findings.
  string step = 1;
  // 'method', 'when', 'rule', 'celRule', 'output', or 'chain'.
  string kind = 2;
  string error = 3;
}

message CheckChainResponse {
  bool ok = 1;
  repeated ChainFinding findings = 2;
}

message InferSchemaRequest {
  // Fully qualified name for the inferred message.
  string name = 1;
  // Sample documents; keys union across samples and numbers stay int64 only
  // when integral in every occurrence.
  repeated google.protobuf.Struct samples = 2;
}

message InferSchemaResponse {
  string type = 1;
  string file = 2;
  // Registrable proto source (json_name preserves sanitized keys).
  string proto_source = 3;
  string descriptor_set_base64 = 4;
}

message MaskMessageRequest {
  SchemaSource schema = 1;
  string type = 2;
  google.protobuf.Struct message = 3;
  // Sensitivity classes to mask, e.g. 'pii'.
  repeated string classes = 4;
  // 'remove' (default) or 'redact'.
  string strategy = 5;
}

message MaskMessageResponse {
  google.protobuf.Struct message = 1;
  repeated string masked_fields = 2;
}
